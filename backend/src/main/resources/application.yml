spring:
  application:
    name: srm-credit-engine
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/srm_credit}
    username: ${DB_USERNAME:srm}
    password: ${DB_PASSWORD:srm}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

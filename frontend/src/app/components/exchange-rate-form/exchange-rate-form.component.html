<section class="card">
  <h2>Taxa de câmbio</h2>
  <p>Cadastre a cotação antes de liquidar uma operação em moeda diferente.</p>
  <div class="form-grid">
    <label>Origem <select [(ngModel)]="form.sourceCurrency" name="source"><option>BRL</option><option>USD</option></select></label>
    <label>Destino <select [(ngModel)]="form.targetCurrency" name="target"><option>USD</option><option>BRL</option></select></label>
    <label>Taxa <input type="number" min="0.00000001" step="0.0001" [(ngModel)]="form.rate" name="rate"></label>
  </div>
  <button (click)="submit()" [disabled]="loading">Salvar taxa</button>
</section>

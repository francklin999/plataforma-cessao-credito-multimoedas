<section class="card">
  <h1>Simular cessão de crédito</h1>
  <p class="muted">As taxas mensais usam formato decimal: 1% = 0,01.</p>
  <div class="form-grid">
    <label>Cedente <input [(ngModel)]="cedent" name="cedent"></label>
    <label>Valor de face <input type="number" min="0.01" [(ngModel)]="form.faceValue" name="faceValue"></label>
    <label>Tipo
      <select [(ngModel)]="form.receivableType" name="type">
        <option value="DUPLICATA_MERCANTIL">Duplicata mercantil</option>
        <option value="CHEQUE_PRE_DATADO">Cheque pré-datado</option>
      </select>
    </label>
    <label>Vencimento <input type="date" [(ngModel)]="form.dueDate" name="dueDate"></label>
    <label>Taxa base mensal <input type="number" min="0" step="0.001" [(ngModel)]="form.baseRate" name="rate"></label>
    <label>Moeda do título <select [(ngModel)]="form.assetCurrency" name="asset"><option>BRL</option><option>USD</option></select></label>
    <label>Moeda de pagamento <select [(ngModel)]="form.paymentCurrency" name="payment"><option>BRL</option><option>USD</option></select></label>
  </div>
  <div class="actions">
    <button (click)="onSimulate()" [disabled]="loading">Simular</button>
    <button class="primary" (click)="onSettle()" [disabled]="loading">Liquidar</button>
  </div>
</section>

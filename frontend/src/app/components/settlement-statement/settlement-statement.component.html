<section class="card">
  <h2>Extrato de liquidações</h2>
  <table>
    <thead><tr><th>Data</th><th>Cedente</th><th>Tipo</th><th>Moeda</th><th>Valor presente</th></tr></thead>
    <tbody>
      <tr *ngFor="let item of settlements"><td>{{ item.createdAt | date:'dd/MM/yyyy HH:mm' }}</td><td>{{ item.cedent }}</td><td>{{ item.receivableType }}</td><td>{{ item.paymentCurrency }}</td><td>{{ item.presentValue | number:'1.2-4' }}</td></tr>
      <tr *ngIf="!settlements.length"><td colspan="5" class="muted">Nenhuma liquidação registrada.</td></tr>
    </tbody>
  </table>
</section>

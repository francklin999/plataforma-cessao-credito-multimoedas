services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: srm_credit
      POSTGRES_USER: srm
      POSTGRES_PASSWORD: srm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srm -d srm_credit"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/srm_credit
      DB_USERNAME: srm
      DB_PASSWORD: srm
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
